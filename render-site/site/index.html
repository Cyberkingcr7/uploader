<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Render Site</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f2ea;
      --panel: #fffdf8;
      --text: #1f1a17;
      --accent: #b75d2b;
      --border: #e5d5c5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(183, 93, 43, 0.16), transparent 32%),
        linear-gradient(135deg, var(--bg), #efe1d2);
      color: var(--text);
    }

    main {
      width: min(680px, calc(100% - 32px));
      padding: 40px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 24px 60px rgba(78, 45, 23, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 0.95;
    }

    p {
      margin: 0 0 18px;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    code {
      padding: 2px 8px;
      border-radius: 999px;
      background: #f3e5d8;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>Your Render site is ready.</h1>
    <p>This folder is being served from <code>/name</code>.</p>
    <p>Replace the files inside the <code>site</code> folder with your real website.</p>
    <p>After deploy, the URL pattern will be <code>your-app.onrender.com/name</code>.</p>
  </main>
</body>
</html>
