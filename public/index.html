<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Drop</title>
  <style>
    :root {
      --bg: #f3efe7;
      --panel: #fffdfa;
      --text: #201914;
      --accent: #a34b20;
      --border: #e6d6c4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(163, 75, 32, 0.18), transparent 28%),
        linear-gradient(135deg, #f9f4ec, var(--bg));
    }

    main {
      width: min(680px, 100%);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 22px 60px rgba(89, 48, 22, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 0.95;
    }

    p {
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    input[type="file"] {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }

    button {
      width: fit-content;
      padding: 12px 18px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      cursor: pointer;
    }

    #result {
      margin-top: 24px;
      padding: 18px;
      border-radius: 18px;
      background: #f8ecdf;
      overflow-wrap: anywhere;
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>Upload a file or folder.</h1>
    <p>Upload one file or a whole folder, then use the generated download button anywhere else.</p>

    <form id="file-form">
      <input type="file" name="file" id="file" required>
      <button type="submit">Upload file</button>
    </form>

    <form id="folder-form">
      <input type="file" id="folder" webkitdirectory directory multiple required>
      <button type="submit">Upload folder</button>
    </form>

    <div id="result" hidden></div>
  </main>

  <script>
    const fileForm = document.getElementById('file-form');
    const folderForm = document.getElementById('folder-form');
    const result = document.getElementById('result');
    const renderResult = (data) => {
      result.hidden = false;
      result.innerHTML = `
        <strong>Uploaded:</strong> ${data.originalName}<br>
        <strong>Type:</strong> ${data.type}<br>
        <strong>Download link:</strong><br>
        <a href="${data.downloadUrl}" target="_blank" rel="noreferrer">${data.downloadUrl}</a><br><br>
        <a href="${data.downloadUrl}" download>Download now</a>
      `;
    };

    fileForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const formData = new FormData(fileForm);
      result.hidden = false;
      result.textContent = 'Uploading...';

      try {
        const response = await fetch('/upload', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Upload failed.');
        }

        renderResult(data);
      } catch (error) {
        result.textContent = error.message;
      }
    });

    folderForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const input = document.getElementById('folder');
      const files = Array.from(input.files || []);

      if (!files.length) {
        result.hidden = false;
        result.textContent = 'Pick a folder first.';
        return;
      }

      const formData = new FormData();
      for (const file of files) {
        formData.append('files', file, file.webkitRelativePath || file.name);
      }

      result.hidden = false;
      result.textContent = 'Uploading folder...';

      try {
        const response = await fetch('/upload-folder', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Folder upload failed.');
        }

        renderResult(data);
      } catch (error) {
        result.textContent = error.message;
      }
    });
  </script>
</body>
</html>
